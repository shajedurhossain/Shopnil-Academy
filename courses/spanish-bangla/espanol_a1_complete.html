<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Español A1 Complete 🇪🇸</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700;800&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1208;--paper:#faf6ee;--cream:#f2ead8;
  --red:#c0392b;--red-s:#e8d5d3;--gold:#c8860a;--gold-s:#fdf0d0;
  --green:#2d6a4f;--green-s:#d8eddf;--blue:#1a4a7a;--blue-s:#d6e8f8;
  --muted:#7a6e5a;--rule:#d8cdb8;--shadow:rgba(26,18,8,0.11);
  --sb:236px;--nav:54px;
}
body{background:var(--paper);color:var(--ink);font-family:'DM Sans',sans-serif;min-height:100vh}
.bn{font-family:'Hind Siliguri',sans-serif}
/* NAV */
.nav{position:fixed;top:0;left:0;right:0;height:var(--nav);background:var(--ink);display:flex;align-items:center;gap:12px;padding:0 16px;z-index:300;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.burger{background:none;border:none;color:#faf6ee;font-size:20px;cursor:pointer;padding:6px 8px;border-radius:6px;line-height:1;flex-shrink:0}
.burger:hover{background:rgba(255,255,255,.1)}
.nav-title{font-family:'DM Serif Display',serif;font-size:16px;color:#f5d98a;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chips{display:flex;gap:6px;flex-shrink:0}
.chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;color:#faf6ee;white-space:nowrap}
.chip.t{color:#f5d98a}.chip.x{color:#90ee90}
/* SIDEBAR */
#sb{position:fixed;top:var(--nav);left:0;bottom:0;width:var(--sb);background:#13100a;border-right:1px solid #1e1a12;overflow-y:auto;z-index:250;transition:transform .25s ease;padding-bottom:60px}
#sb::-webkit-scrollbar{width:3px}
#sb::-webkit-scrollbar-thumb{background:#2a2010}
#sb.off{transform:translateX(-100%)}
.sb-home{display:flex;align-items:center;gap:8px;padding:12px 14px;font-size:13px;font-weight:700;color:#f5d98a;cursor:pointer;border-bottom:1px solid #1e1a12}
.sb-home:hover{background:rgba(255,255,255,.04)}
.sb-ch-header{padding:10px 14px 4px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .15s}
.sb-ch-header:hover{background:rgba(255,255,255,.03)}
.sb-ch-badge{font-size:10px;font-weight:800;padding:2px 7px;border-radius:8px;color:#fff;flex-shrink:0}
.sb-ch-name{font-size:11.5px;font-weight:700;color:#8a7860;flex:1}
.sb-ch-arrow{font-size:10px;color:#4a4030;transition:transform .2s}
.sb-ch-header.open .sb-ch-arrow{transform:rotate(90deg)}
.sb-lessons{display:none;padding-bottom:4px}
.sb-ch-header.open + .sb-progress + .sb-lessons{display:block}
.sb-item{display:flex;align-items:flex-start;gap:7px;padding:7px 14px 7px 22px;font-size:12px;font-weight:600;color:#6a6050;cursor:pointer;border-left:3px solid transparent;transition:all .15s;line-height:1.4}
.sb-item:hover{color:#faf6ee;background:rgba(255,255,255,.04)}
.sb-item.active{color:#f5d98a;border-left-color:#f5d98a;background:rgba(245,217,138,.06)}
.sb-item.done{color:#4a9a68}
.sb-icon{font-size:12px;flex-shrink:0;margin-top:1px}
.sb-sub{font-family:'Hind Siliguri',sans-serif;font-size:10px;color:#3a3028;margin-top:1px}
.sb-item.done .sb-sub{color:#2a6a48}
.sb-progress{height:2px;background:#2a2010;margin:0 14px 6px}
.sb-progress-fill{height:100%;background:var(--gold);border-radius:1px;transition:width .4s}
/* LAYOUT */
#lay{margin-top:var(--nav);margin-left:var(--sb);transition:margin-left .25s ease;min-height:calc(100vh - var(--nav))}
.lnav{background:#fff;border-bottom:1px solid var(--rule);padding:8px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.lnav-label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}
.lpill{padding:4px 11px;border-radius:20px;font-size:10.5px;font-weight:800;cursor:pointer;border:1.5px solid var(--rule);color:var(--muted);background:var(--cream);transition:all .15s;white-space:nowrap}
.lpill:hover{border-color:var(--gold);color:var(--gold)}
.lpill.on{background:var(--red);color:#fff;border-color:var(--red)}
.lpill.done{background:var(--green-s);color:var(--green);border-color:var(--green)}
.tabs{display:flex;background:var(--cream);border-bottom:1px solid var(--rule);padding:0 16px;overflow-x:auto;gap:2px}
.tab{padding:9px 14px;font-size:11px;font-weight:700;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer;letter-spacing:.04em;text-transform:uppercase;transition:color .15s;border:none;background:none;font-family:'DM Sans',sans-serif}
.tab:hover{color:var(--ink)}.tab.on{color:var(--red);border-bottom:2px solid var(--red)}.tab.done{color:var(--green)}
/* PAGES */
.pg{display:none}.pg.show{display:block}
.wrap{max-width:700px;margin:0 auto;padding:22px 18px 52px}
.wrap.wide{max-width:640px}
/* CULTURE CARD */
.cult{background:linear-gradient(135deg,#1a1208,#2d1a08);color:#faf6ee;border-radius:14px;padding:15px 18px;display:flex;gap:12px;margin-bottom:20px;position:relative;overflow:hidden}
.cult::after{content:attr(data-word);position:absolute;right:-6px;top:4px;font-family:'DM Serif Display',serif;font-size:48px;color:rgba(245,217,138,.07);pointer-events:none;white-space:nowrap}
.cult-flag{font-size:28px;flex-shrink:0;margin-top:2px}
.cult-bn{font-family:'Hind Siliguri',sans-serif;font-size:13.5px;color:#f5d98a;margin-bottom:4px;line-height:1.55}
.cult-en{font-size:11.5px;color:rgba(250,246,238,.6);line-height:1.5;font-style:italic}
/* SECTION HEAD */
.sh{display:flex;align-items:center;gap:9px;margin-bottom:12px;flex-wrap:wrap}
.sh-tag{font-size:10px;font-weight:800;color:var(--red);background:var(--red-s);border-radius:5px;padding:2px 8px;letter-spacing:.07em;text-transform:uppercase;white-space:nowrap}
.sh-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--ink)}
.sh-bn{font-family:'Hind Siliguri',sans-serif;font-size:12.5px;color:var(--muted);margin-top:2px}
/* GRAMMAR BOX */
.gram{background:linear-gradient(135deg,#f0f7ff,#e8f4ee);border:1px solid rgba(26,74,122,.18);border-radius:13px;padding:14px 16px;margin-bottom:16px}
.gram-title{font-size:10.5px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px}
.gram-en{font-size:12.5px;color:var(--ink);line-height:1.65;margin-bottom:7px}
.gram-bn{font-family:'Hind Siliguri',sans-serif;font-size:13px;color:#1a3a6a;line-height:1.65}
.gram table{width:100%;border-collapse:collapse;margin-top:9px;font-size:12.5px}
.gram th{background:rgba(26,74,122,.1);padding:5px 9px;text-align:left;font-size:10.5px;color:var(--muted);font-weight:700}
.gram td{padding:6px 9px;border-bottom:1px solid rgba(26,74,122,.1)}
.gram td.es{font-weight:700;color:var(--red)}
.gram td.bn2{font-family:'Hind Siliguri',sans-serif;color:var(--blue)}
/* VOCAB */
.vg{display:grid;gap:6px;margin-bottom:20px}
.vc{background:#fff;border:1px solid var(--rule);border-radius:10px;display:grid;grid-template-columns:42px 1.1fr 1fr 1fr 36px;align-items:center;padding:9px 11px;gap:8px;cursor:pointer;transition:all .17s;box-shadow:0 1px 3px var(--shadow)}
.vc:hover{border-color:var(--gold);transform:translateY(-1px);box-shadow:0 3px 10px rgba(200,134,10,.13)}
.ve{font-size:20px;text-align:center}
.ves{font-weight:700;font-size:14px;color:var(--red)}
.ven{font-size:11.5px;color:var(--muted)}
.vbn{font-family:'Hind Siliguri',sans-serif;font-size:12.5px;color:var(--blue)}
.ab{background:var(--ink);color:#faf6ee;border:none;border-radius:6px;width:30px;height:30px;font-size:13px;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ab:hover{background:var(--red)}
/* MNEMONIC */
.mn{background:var(--green-s);border:1px solid rgba(45,106,79,.2);border-radius:12px;padding:13px 15px;margin-bottom:20px}
.mn-title{font-size:10.5px;font-weight:800;color:var(--green);text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px}
.mn-row{padding:6px 0;border-bottom:1px solid rgba(45,106,79,.12);font-size:12.5px;line-height:1.6}
.mn-row:last-child{border-bottom:none}
.mn-bn{font-family:'Hind Siliguri',sans-serif;color:#1e5a38;display:block;margin-bottom:2px;font-size:12.5px}
.mn-en{color:var(--muted);font-size:12px}
/* BUTTON */
.go{display:block;width:100%;background:var(--red);color:#fff;border:none;border-radius:10px;padding:12px 18px;font-family:'Hind Siliguri',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;text-align:center}
.go:hover{background:#a93226;transform:translateY(-1px);box-shadow:0 4px 14px rgba(192,57,43,.28)}
/* FITB */
.fc{background:#fff;border:1px solid var(--rule);border-radius:12px;padding:15px;margin-bottom:9px;box-shadow:0 1px 3px var(--shadow);transition:border-color .2s,background .2s}
.fc.ok{border-color:var(--green);background:var(--green-s)}
.fc.bad{border-color:var(--red);background:var(--red-s)}
.fq{font-size:14.5px;font-weight:600;color:var(--ink);margin-bottom:8px;line-height:1.5}
.fr{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.fi{background:var(--cream);border:2px solid var(--rule);border-radius:7px;padding:6px 11px;font-family:'DM Sans',sans-serif;font-size:14.5px;color:var(--ink);min-width:100px;transition:border-color .2s}
.fi:focus{outline:none;border-color:var(--gold);background:#fff}
.fi.ok{border-color:var(--green);background:var(--green-s)}
.fi.bad{border-color:var(--red);background:var(--red-s)}
.ck{background:var(--gold-s);border:1px solid var(--gold);color:var(--gold);border-radius:6px;padding:6px 12px;font-weight:700;font-size:11.5px;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.ck:hover{background:var(--gold);color:#fff}
.fhint{font-family:'Hind Siliguri',sans-serif;font-size:11px;color:var(--muted);margin-top:4px}
.ffb{margin-top:6px;font-size:12.5px;font-weight:600}
.score-strip{background:var(--cream);border:1px solid var(--rule);border-radius:8px;padding:9px 14px;margin-top:11px;display:flex;align-items:center;justify-content:space-between;font-size:13px}
.sv{font-weight:800;color:var(--green);font-size:14px}
/* SPEAKING */
.sp-tip{background:var(--blue-s);border:1px solid rgba(26,74,122,.18);border-radius:9px;padding:10px 14px;font-size:12px;color:var(--blue);margin-bottom:14px;line-height:1.6}
.sp-tip-bn{font-family:'Hind Siliguri',sans-serif;font-size:12.5px;display:block;margin-bottom:2px}
.spc{background:#fff;border:1px solid var(--rule);border-radius:12px;padding:15px;margin-bottom:9px;box-shadow:0 1px 3px var(--shadow)}
.sp-num{font-size:10px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.09em;margin-bottom:6px}
.sp-es{font-family:'DM Serif Display',serif;font-size:19px;color:var(--ink);margin-bottom:3px}
.sp-ph{font-size:11px;color:var(--muted);font-style:italic;margin-bottom:3px}
.sp-en{font-size:12px;color:var(--muted);margin-bottom:3px}
.sp-bn{font-family:'Hind Siliguri',sans-serif;font-size:12.5px;color:var(--blue);margin-bottom:11px}
.sp-btns{display:flex;gap:6px;flex-wrap:wrap}
.spb{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:7px;border:1.5px solid;font-size:11.5px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.spb.li{background:var(--ink);color:#faf6ee;border-color:var(--ink)}.spb.li:hover{background:var(--red);border-color:var(--red)}
.spb.sp{background:#fff;color:var(--blue);border-color:rgba(26,74,122,.38)}.spb.sp:hover{background:var(--blue-s)}
.spb.rec{background:var(--red);color:#fff;border-color:var(--red);animation:rec 1s infinite}
@keyframes rec{0%,100%{opacity:1}50%{opacity:.7}}
.sp-res{margin-top:7px;font-size:12px;font-weight:600;padding:6px 10px;border-radius:6px;display:none}
.sp-res.pass{background:var(--green-s);color:var(--green);display:block}
.sp-res.fail{background:var(--red-s);color:var(--red);display:block}
/* QUIZ */
.qz-dots{display:flex;gap:4px;margin-bottom:14px}
.qd{flex:1;height:5px;border-radius:3px;background:var(--rule);transition:background .3s}
.qd.on{background:var(--gold)}.qd.ok{background:var(--green)}.qd.bad{background:var(--red)}
.qcard{background:#fff;border:1px solid var(--rule);border-radius:14px;padding:20px;box-shadow:0 2px 10px var(--shadow);animation:fadeUp .22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.qn{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.09em;text-transform:uppercase;margin-bottom:7px}
.qq{font-family:'Hind Siliguri',sans-serif;font-size:15.5px;font-weight:700;color:var(--ink);margin-bottom:14px;line-height:1.5}
.qopts{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.qo{background:var(--cream);border:2px solid var(--rule);border-radius:9px;padding:10px 12px;font-size:12.5px;font-weight:600;color:var(--ink);cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;transition:all .14s}
.qo:hover:not(:disabled){border-color:var(--gold);background:var(--gold-s)}
.qo:disabled{cursor:default}
.qo.ok{border-color:var(--green);background:var(--green-s);color:var(--green)}
.qo.bad{border-color:var(--red);background:var(--red-s);color:var(--red)}
.qfb{margin-top:11px;padding:8px 12px;border-radius:8px;font-size:12.5px;font-weight:600;display:none;line-height:1.5}
.qfb.show{display:block}.qfb.ok{background:var(--green-s);color:var(--green)}.qfb.bad{background:var(--red-s);color:var(--red)}
.qnxt{margin-top:10px;background:var(--ink);color:#faf6ee;border:none;border-radius:8px;padding:8px 16px;font-weight:700;font-size:12.5px;cursor:pointer;display:none;transition:background .15s;font-family:'DM Sans',sans-serif}
.qnxt.show{display:inline-block}.qnxt:hover{background:var(--red)}
/* REVIEW */
.rev-section{margin-bottom:22px}
.rev-section h3{font-family:'DM Serif Display',serif;font-size:16px;color:var(--ink);margin-bottom:10px;padding-bottom:5px;border-bottom:2px solid var(--rule)}
.rev-item{background:#fff;border:1px solid var(--rule);border-radius:9px;padding:9px 12px;margin-bottom:6px;display:flex;gap:9px;align-items:center;cursor:pointer;transition:border-color .15s}
.rev-item:hover{border-color:var(--gold)}
.rev-em{font-size:17px;width:26px;text-align:center;flex-shrink:0}
.rev-es{font-weight:700;color:var(--red);font-size:13px;flex:1}
.rev-en{font-size:11.5px;color:var(--muted);flex:1}
.rev-bn{font-family:'Hind Siliguri',sans-serif;font-size:12.5px;color:var(--blue);flex:1}
/* HOME */
.home-hero{background:linear-gradient(135deg,#1a1208,#2d1408,#1a1a08);color:#faf6ee;border-radius:16px;padding:24px;margin-bottom:20px;text-align:center;position:relative;overflow:hidden}
.home-hero h1{font-family:'DM Serif Display',serif;font-size:26px;color:#f5d98a;margin-bottom:6px}
.home-hero p{font-family:'Hind Siliguri',sans-serif;font-size:14px;color:rgba(250,246,238,.7);margin-bottom:16px}
.overall-prog{background:rgba(255,255,255,.1);border-radius:8px;padding:12px 16px;margin-bottom:12px}
.op-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;color:rgba(250,246,238,.7)}
.op-bar{height:8px;background:rgba(255,255,255,.15);border-radius:4px;overflow:hidden}
.op-fill{height:100%;background:linear-gradient(90deg,var(--gold),#f5d98a);border-radius:4px;transition:width .5s}
.level-badge{display:inline-block;background:rgba(245,217,138,.15);border:1px solid rgba(245,217,138,.3);border-radius:10px;padding:6px 14px;font-size:13px;font-weight:700;color:#f5d98a}
.ch-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.ch-card{background:#fff;border:1px solid var(--rule);border-radius:12px;padding:14px;cursor:pointer;transition:all .18s;box-shadow:0 1px 4px var(--shadow)}
.ch-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 14px rgba(200,134,10,.14)}
.ch-card.done-ch{border-color:var(--green);background:var(--green-s)}
.ch-num{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.ch-name{font-family:'DM Serif Display',serif;font-size:14.5px;color:var(--ink);margin-bottom:2px}
.ch-name-bn{font-family:'Hind Siliguri',sans-serif;font-size:11px;color:var(--muted)}
.ch-bar{height:4px;background:var(--rule);border-radius:2px;overflow:hidden;margin-top:9px}
.ch-bar-fill{height:100%;border-radius:2px;transition:width .4s}
.ch-stat{font-size:10px;color:var(--muted);margin-top:3px}
/* DONE */
.done-wrap{max-width:500px;margin:0 auto;padding:32px 18px 52px;text-align:center}
.done-medal{font-size:60px;display:inline-block;animation:bnc .5s ease;margin-bottom:12px}
@keyframes bnc{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.done-title{font-family:'DM Serif Display',serif;font-size:24px;color:var(--ink);margin-bottom:6px}
.done-sub{font-family:'Hind Siliguri',sans-serif;font-size:13.5px;color:var(--muted);margin-bottom:18px}
.done-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:20px}
.dst{background:#fff;border:1px solid var(--rule);border-radius:10px;padding:12px 8px}
.dv{font-family:'DM Serif Display',serif;font-size:22px;color:var(--red)}
.dl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-top:3px;letter-spacing:.05em}
.recap{background:var(--cream);border-radius:11px;padding:14px;margin-bottom:16px;text-align:left;max-height:280px;overflow-y:auto}
.recap h3{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px}
.rrow{display:flex;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid var(--rule);font-size:12.5px}
.rrow:last-child{border-bottom:none}
.res{font-weight:700;color:var(--red);min-width:120px;font-size:12.5px}
.ren{color:var(--muted);font-size:11.5px;flex:1}
.rbn{font-family:'Hind Siliguri',sans-serif;color:var(--blue);font-size:12.5px}
.next-ch-box{background:linear-gradient(135deg,var(--ink),#2d1a08);color:#faf6ee;border-radius:11px;padding:13px 16px;text-align:left;margin-bottom:14px}
.next-ch-box h4{font-size:10px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:#f5d98a;margin-bottom:4px}
.next-ch-box p{font-size:12.5px;opacity:.78;line-height:1.5}
.done-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.rst{background:var(--cream);color:var(--ink);border:1px solid var(--rule);border-radius:10px;padding:10px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
.rst:hover{background:var(--rule)}
.nxt-btn{background:var(--red);color:#fff;border:none;border-radius:10px;padding:10px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Hind Siliguri',sans-serif}
.nxt-btn:hover{background:#a93226;transform:translateY(-1px)}
#toast{position:fixed;top:60px;right:14px;background:var(--gold);color:#fff;border-radius:8px;padding:6px 13px;font-weight:800;font-size:13px;z-index:999;opacity:0;transform:translateY(-5px);transition:all .28s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
@media(max-width:600px){
  #sb{transform:translateX(-100%)}
  #sb.mob-open{transform:translateX(0)!important}
  #lay{margin-left:0!important}
  .vc{grid-template-columns:34px 1fr 1fr 32px}.ven{display:none}
  .qopts{grid-template-columns:1fr}
  .done-stats{grid-template-columns:1fr 1fr}
  .ch-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header class="nav">
  <button class="burger" onclick="toggleSB()">☰</button>

// STATE
// ═══════════════════════════════════════════════
var LDATA = {};          // filled by Steps 3-5
var curCh  = null;
var curLid = null;
var curPhase = 'v';
var sbOpen = true;
var xp = 0;
var timerSecs = 600;
var timerInt  = null;
var lessonState = {};    // keyed by lid
var activeQuiz  = null;  // {questions:[], idx:0, score:0, results:[], isReview:false}

function getLState(lid) {
  if (!lessonState[lid]) {
    var ld = LDATA[lid];
    var fl = ld && ld.fitb  ? ld.fitb.length  : 1;
    var sl = ld && ld.speak ? ld.speak.length : 1;
    var fc = [], sa = [];
    for (var i=0;i<fl;i++){fc.push(false);}
    for (var j=0;j<sl;j++){sa.push(false);}
    lessonState[lid] = {
      fitbChecked:fc, fitbCorrect:0, fitbResults:[],
      spAttempted:sa, spCorrect:0,   spResults:[],
      qzIdx:0, qzScore:0, qzResults:[], done:false
    };
  }
  return lessonState[lid];
}

// INIT
// ═══════════════════════════════════════════════
function init() {
  buildSidebar();
  buildHomeGrid();
  startTimer();
  if (window.innerWidth <= 600) {
    sbOpen = false;
    document.getElementById('sb').classList.add('off');
    document.getElementById('lay').style.marginLeft = '0';
  }
}

// ═══════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════
function buildSidebar() {
  var html = '';
  CURRICULUM.forEach(function(ch, ci) {
    html += '<div class="sb-ch-header" id="sbh-'+ch.id+'" data-chid="'+ch.id+'" onclick="toggleSBCh(this.getAttribute(\'data-chid\'))">'; 
    html += '<span class="sb-ch-badge" style="background:'+ch.color+'">'+(ci+1)+'</span>';
    html += '<span class="sb-ch-name">'+ch.name+'</span>';
    html += '<span class="sb-ch-arrow">▶</span></div>';
    html += '<div class="sb-progress"><div class="sb-progress-fill" id="sbp-'+ch.id+'" style="width:0%"></div></div>';
    html += '<div class="sb-lessons" id="sbl-'+ch.id+'">';
    ch.lessons.forEach(function(l) {
    html += '<div class="sb-item" id="sbi-'+l.id+'" data-chid="'+ch.id+'" data-lid="'+l.id+'" onclick="openLesson(this.getAttribute(\'data-chid\'),this.getAttribute(\'data-lid\'))">';

      html += '<span class="sb-icon">'+l.icon+'</span>';
      html += '<div><div>'+l.name+'</div><div class="sb-sub">'+l.bn+'</div></div></div>';
    });
    html += '</div>';
  });
  document.getElementById('sb-chapters').innerHTML = html;
  // open C1 by default
  openSBCh('C1');
}

function openSBCh(chId) {
  var h = document.getElementById('sbh-'+chId);
  var l = document.getElementById('sbl-'+chId);
  if (h && l) { h.classList.add('open'); l.style.display = 'block'; }
}

function toggleSBCh(chId) {
  var h = document.getElementById('sbh-'+chId);
  var l = document.getElementById('sbl-'+chId);
  if (!h || !l) { return; }
  var isOpen = h.classList.contains('open');
  h.classList.toggle('open');
  l.style.display = isOpen ? 'none' : 'block';
}

function toggleSB() {
  sbOpen = !sbOpen;
  var sb  = document.getElementById('sb');
  var lay = document.getElementById('lay');
  if (sbOpen) {
    sb.classList.remove('off');
    if (window.innerWidth > 600) { lay.style.marginLeft = ''; }
    else { sb.classList.add('mob-open'); }
  } else {
    sb.classList.add('off');
    sb.classList.remove('mob-open');
    lay.style.marginLeft = '0';
  }
}

function updateSBItem(lid) {
  var el = document.getElementById('sbi-'+lid);
  if (!el) { return; }
  var st = getLState(lid);
  el.className = 'sb-item' + (st.done ? ' done' : (lid===curLid ? ' active' : ''));
  var sub = el.querySelector('.sb-sub');
  if (sub) { sub.className = 'sb-sub' + (st.done ? ' done' : ''); }
}

function updateSBProgress(chId) {
  var ch = getCh(chId);
  if (!ch) { return; }
  var done = 0;
  ch.lessons.forEach(function(l){ if (getLState(l.id).done) { done++; } });
  var el = document.getElementById('sbp-'+chId);
  if (el) { el.style.width = Math.round(done/ch.lessons.length*100)+'%'; }
}

// ═══════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════
function buildHomeGrid() {
  var html = '';
  CURRICULUM.forEach(function(ch, ci) {
    html += '<div class="ch-card" data-chid="'+ch.id+'" onclick="openChapter(this.getAttribute(\'data-chid\'))" id="chcard-'+ch.id+'">';
    html += '<div class="ch-num" style="color:'+ch.color+'">Chapter '+(ci+1)+'</div>';
    html += '<div class="ch-name">'+ch.name+'</div>';
    html += '<div class="ch-name-bn bn">'+ch.bn+'</div>';
    html += '<div class="ch-bar"><div class="ch-bar-fill" id="chbar-'+ch.id+'" style="width:0%;background:'+ch.color+'"></div></div>';
    html += '<div class="ch-stat" id="chstat-'+ch.id+'">0/'+ch.lessons.length+' lessons</div></div>';
  });
  document.getElementById('ch-grid').innerHTML = html;
}

function refreshHome() {
  var total = 0, done = 0;
  CURRICULUM.forEach(function(ch) {
    var d = 0;
    ch.lessons.forEach(function(l){ if(getLState(l.id).done){d++;done++;} });
    total += ch.lessons.length;
    var pct = Math.round(d/ch.lessons.length*100);
    var bar  = document.getElementById('chbar-'+ch.id);
    var stat = document.getElementById('chstat-'+ch.id);
    var card = document.getElementById('chcard-'+ch.id);
    if (bar)  { bar.style.width = pct+'%'; }
    if (stat) { stat.textContent = d+'/'+ch.lessons.length+' lessons'; }
    if (card) { card.className = 'ch-card'+(pct===100?' done-ch':''); }
  });
  var pct = total>0 ? Math.round(done/total*100) : 0;
  var fill = document.getElementById('overall-fill');
  var pctEl = document.getElementById('overall-pct');
  if (fill)  { fill.style.width = pct+'%'; }
  if (pctEl) { pctEl.textContent = pct+'%'; }
  var lvls = [
    {min:0,lbl:'🌱 Principiante'},{min:15,lbl:'📚 Aprendiz'},
    {min:30,lbl:'✏️ Estudiante'},{min:50,lbl:'⚡ Progresando'},
    {min:70,lbl:'🔥 Hablante'},{min:90,lbl:'🏆 Avanzado'},{min:100,lbl:'🌟 Experto'}
  ];
  var lbl = lvls[0].lbl;
  lvls.forEach(function(l){ if(pct>=l.min){lbl=l.lbl;} });
  var lb = document.getElementById('level-badge');
  if (lb) { lb.textContent = lbl; }
}

function goHome() {
  curLid = null; curCh = null;
  showPage('pg-home');
  document.getElementById('lnav').style.display = 'none';
  document.getElementById('tabs').style.display = 'none';
  document.getElementById('nav-title').textContent = 'Español A1 Complete 🇪🇸';
  refreshHome();
  if (window.innerWidth <= 600 && sbOpen) { toggleSB(); }
}

function openChapter(chId) {
  var ch = getCh(chId);
  if (!ch) { return; }
  openSBCh(chId);
  // find first undone lesson
  var target = ch.lessons[0].id;
  for (var i=0; i<ch.lessons.length; i++) {
    if (!getLState(ch.lessons[i].id).done) { target = ch.lessons[i].id; break; }
  }
  openLesson(chId, target);
}

// ═══════════════════════════════════════════════
// LESSON NAVIGATION
// ═══════════════════════════════════════════════
function openLesson(chId, lid) {
  if (!LDATA[lid]) { showToast('পাঠটি শীঘ্রই আসছে! 🚧'); return; }
  curCh = chId; curLid = lid; curPhase = 'v';
  var li = getLessonInfo(lid);
  document.getElementById('nav-title').textContent = li ? li.icon+' '+li.name : lid;
  buildPills(chId);
  document.getElementById('lnav').style.display = 'flex';
  document.getElementById('tabs').style.display = 'flex';
  var rBtn = document.getElementById('lpR');
  if (rBtn) { rBtn.style.display = 'inline-block'; }
  renderPhase('v');
  updateAllSBItems();
  updateSBProgress(chId);
  if (window.innerWidth <= 600 && sbOpen) { toggleSB(); }
}

function buildPills(chId) {
  var ch = getCh(chId);
  if (!ch) { return; }
  var html = '';
  ch.lessons.forEach(function(l, i) {
    var st = getLState(l.id);
    var cls = 'lpill'+(l.id===curLid?' on':st.done?' done':'');
    html += '<button class="'+cls+'" id="lp-'+l.id+'" onclick="openLesson(\''+ch.id+'\',\''+l.id+'\')">'+
            'L'+(i+1)+' '+l.icon+'</button>';
  });
  document.getElementById('lpills').innerHTML = html;
}

function refreshPills() {
  if (!curCh) { return; }
  var ch = getCh(curCh);
  if (!ch) { return; }
  ch.lessons.forEach(function(l) {
    var el = document.getElementById('lp-'+l.id);
    if (!el) { return; }
    var st = getLState(l.id);
    el.className = 'lpill'+(l.id===curLid?' on':st.done?' done':'');
  });
}

function updateAllSBItems() {
  CURRICULUM.forEach(function(ch){ ch.lessons.forEach(function(l){ updateSBItem(l.id); }); });
}

function openReview() {
  if (!curCh) { return; }
  renderReview(curCh);
}

// ═══════════════════════════════════════════════
// PHASE RENDERING
// ═══════════════════════════════════════════════
function goPhase(ph) {
  curPhase = ph;
  renderPhase(ph);
  updateTabs(ph);
  window.scrollTo(0,0);
}

function updateTabs(ph) {
  var order = ['v','w','s','q'];
  var ci = order.indexOf(ph);
  order.forEach(function(p, i) {
    var t = document.getElementById('tab-'+p);
    if (!t) { return; }
    t.className = 'tab'+(i<ci?' done':i===ci?' on':'');
  });
}

function renderPhase(ph) {
  var ld = LDATA[curLid];
  if (!ld) { return; }
  if (ph === 'q') { startLessonQuiz(); return; }
  showPage('pg-lesson');
  var c = document.getElementById('lesson-content');
  if      (ph==='v') { c.innerHTML = buildVocabHTML(ld); }
  else if (ph==='w') { c.innerHTML = buildFitbHTML(ld);  attachFitbEvents(); }
  else if (ph==='s') { c.innerHTML = buildSpeakHTML(ld); attachSpeakEvents(); }
  updateTabs(ph);
}

function doSpeech(i) {
  var RC = window.webkitSpeechRecognition || window.SpeechRecognition || null;
  var res = document.getElementById('spr'+i);
  if (!RC) {
    res.className='sp-res fail'; res.textContent='⚠️ Chrome/Edge browser ব্যবহার করুন।'; return;
  }
  var rec = new RC();
  rec.lang='es-ES'; rec.interimResults=false; rec.maxAlternatives=3;
  var btn = document.getElementById('spmb'+i);
  if (btn) { btn.className='spb rec'; btn.textContent='⏺ শুনছি...'; }
  rec.onresult = function(e) {
    var heard = '';
    for (var j=0;j<e.results[0].length;j++){heard+=e.results[0][j].transcript+' ';}
    heard = heard.trim().toLowerCase();
    var ld  = LDATA[curLid];
    var tgt = ld.speak[i].es.toLowerCase().replace(/[¿¡.,]/g,'');
    var ok  = simScore(heard, tgt) >= 0.5;
    var st  = getLState(curLid);
    if (ok && !st.spAttempted[i]) { st.spCorrect++; addXP(10); }
    st.spAttempted[i] = true;
    st.spResults[i]   = ok;
    res.className = 'sp-res '+(ok?'pass':'fail');
    res.textContent = ok ? '✅ দারুণ! শুনলাম: "'+heard+'"'
                         : '❌ শুনলাম: "'+heard+'" — আবার চেষ্টা! সঠিক: '+ld.speak[i].es;
    var sc = document.getElementById('sp-score');
    if (sc) { sc.textContent = st.spCorrect+'/'+ld.speak.length; }
    if (btn) { btn.className='spb sp'; btn.textContent='🎤 আবার বলুন'; }
    // Auto-play correct pronunciation after attempt
    setTimeout(function() { playAudio(ld.speak[i].es); }, 600);
  };
  rec.onerror = function(err) {
    if (res) { res.className='sp-res fail'; res.textContent='⚠️ শুনতে পাইনি ('+err.error+')'; }
    if (btn) { btn.className='spb sp'; btn.textContent='🎤 বলুন'; }
  };
  rec.onend = function() { if(btn&&btn.textContent==='⏺ শুনছি...'){btn.className='spb sp';btn.textContent='🎤 বলুন';} };
  rec.start();
}

function simScore(a,b) {
  a=a.replace(/[^a-záéíóúüñ ]/gi,'').trim();
  b=b.replace(/[^a-záéíóúüñ ]/gi,'').trim();
  if (a===b) { return 1; }
  var aw=a.split(' '),bw=b.split(' '),m=0;
  aw.forEach(function(w){ if(w.length<2){return;} bw.forEach(function(x){ if(w===x){m++;} }); });
  return m/Math.max(aw.length,bw.length,1);
}

function startLessonQuiz() {
  var ld = LDATA[curLid];
  if (!ld || !ld.quiz) { return; }
  var st = getLState(curLid);
  // reset if already done so user can replay
  if (st.qzIdx >= ld.quiz.length) {
    st.qzIdx=0; st.qzScore=0; st.qzResults=[];
  }
  activeQuiz = {questions:ld.quiz, idx:st.qzIdx, score:st.qzScore, results:st.qzResults, isReview:false, lid:curLid};
  renderQuizPage();
}

function renderReview(chId) {
  var ch = getCh(chId);
  if (!ch) { return; }
  showPage('pg-review');
  document.getElementById('tabs').style.display = 'none';
  var chn = chId.replace('C','');
  var h = '<div class="wrap">';
  h += '<div class="sh"><span class="sh-tag">Ch'+chn+' · Review</span>';
  h += '<div><div class="sh-title">'+ch.name+' — সব শব্দ</div>';
  h += '<div class="sh-bn bn">All vocabulary — click to hear 🔊</div></div></div>';
  ch.lessons.forEach(function(l) {
    var ld = LDATA[l.id];
    if (!ld) { return; }
    h += '<div class="rev-section"><h3>'+l.icon+' '+l.name+'</h3>';
    ld.vocab.forEach(function(v) {
      var e = esc(v.es);
      h += '<div class="rev-item" data-es="'+e+'" onclick="playAudio(this.getAttribute(\'data-es\'))">';
      h += '<div class="rev-em">'+v.em+'</div>';
      h += '<div class="rev-es">'+v.es+'</div>';
      h += '<div class="rev-en">'+v.en+'</div>';
      h += '<div class="rev-bn bn">'+v.bn+'</div></div>';
    });
    h += '</div>';
  });
  h += '<button class="go" data-chid="'+chId+'" onclick="startChapterQuiz(this.getAttribute(\'data-chid\'))">🎯 Chapter Quiz শুরু করুন →</button>';
  h += '</div>';
  document.getElementById('review-content').innerHTML = h;
}

function startChapterQuiz(chId) {
  var ch = getCh(chId);
  if (!ch) { return; }
  var allQ = [];
  ch.lessons.forEach(function(l){ var ld=LDATA[l.id]; if(ld&&ld.quiz){ld.quiz.forEach(function(q){allQ.push(q);});} });
  // shuffle
  for (var i=allQ.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1)); var tmp=allQ[i]; allQ[i]=allQ[j]; allQ[j]=tmp;
  }
  allQ = allQ.slice(0, Math.min(15, allQ.length));
  activeQuiz = {questions:allQ, idx:0, score:0, results:[], isReview:true, chId:chId};
  renderQuizPage();
}

function renderQuizPage() {
  var aq = activeQuiz;
  if (aq.idx >= aq.questions.length) { finishQuiz(); return; }
  showPage('pg-quiz');
  // dots
  var dh='';
  aq.questions.forEach(function(q,i){ dh+='<div class="qd" id="qdot'+i+'"></div>'; });
  document.getElementById('qz-dots').innerHTML = dh;
  renderQCard();
}

function renderQCard() {
  var aq = activeQuiz;
  if (aq.idx >= aq.questions.length) { finishQuiz(); return; }
  // update dots
  aq.questions.forEach(function(q,i){
    var d=document.getElementById('qdot'+i);
    if(!d){return;}
    d.className='qd'+(i<aq.idx?(aq.results[i]?' ok':' bad'):i===aq.idx?' on':'');
  });
  var q  = aq.questions[aq.idx];
  var oh = '';
  q.o.forEach(function(opt,j){ oh+='<button class="qo" data-j="'+j+'">'+opt+'</button>'; });
  var label = aq.isReview ? 'Ch Quiz ' : 'প্রশ্ন ';
  document.getElementById('qcard').innerHTML =
    '<div class="qn">'+label+(aq.idx+1)+' / '+aq.questions.length+'</div>'+
    '<div class="qq bn">'+q.q+'</div>'+
    '<div class="qopts">'+oh+'</div>'+
    '<div class="qfb" id="qfb"></div>'+
    '<button class="qnxt" id="qnxt">পরবর্তী →</button>';
  document.getElementById('qcard').querySelectorAll('.qo').forEach(function(btn){
    btn.addEventListener('click', function(){ answerQ(parseInt(btn.getAttribute('data-j'))); });
  });
  document.getElementById('qnxt').addEventListener('click', function(){
    aq.idx++; renderQCard();
  });
}

function answerQ(chosen) {
  var aq = activeQuiz;
  var q  = aq.questions[aq.idx];
  var ok = (chosen===q.a);
  document.getElementById('qcard').querySelectorAll('.qo').forEach(function(btn,i){
    btn.disabled=true;
    if(i===q.a){btn.className='qo ok';}
    else if(i===chosen&&!ok){btn.className='qo bad';}
  });
  var fb=document.getElementById('qfb');
  fb.className='qfb '+(ok?'ok':'bad')+' show';
  fb.textContent = ok ? '✅ সঠিক! '+q.f : '❌ ভুল! সঠিক: '+q.o[q.a]+' — '+q.f;
  if (ok) { aq.score++; addXP(10); }
  aq.results.push(ok);
  // sync lesson state if not review
  if (!aq.isReview && aq.lid) {
    var st = getLState(aq.lid);
    st.qzIdx = aq.idx; st.qzScore = aq.score; st.qzResults = aq.results;
  }
  var nb=document.getElementById('qnxt');
  if(nb){nb.className='qnxt show';}
}

function finishQuiz() {
  var aq  = activeQuiz;
  var pct = Math.round(aq.score/aq.questions.length*100);
  var medal = pct>=90?'🥇':pct>=70?'🥈':pct>=50?'🥉':'📚';
  var title = pct>=90?'¡Perfecto!':pct>=70?'¡Muy bien!':pct>=50?'¡Bien!':'Sigue intentando!';
  var sub   = pct>=70?'দারুণ! পরবর্তী পাঠে যান!':'আরেকবার চেষ্টা করুন!';
  // if lesson quiz, mark done
  if (!aq.isReview && aq.lid) {
    var st = getLState(aq.lid);
    st.done=true;
    updateAllSBItems();
    updateSBProgress(curCh);
    refreshPills();
    refreshHome();
  }
  document.getElementById('d-medal').textContent = medal;
  document.getElementById('d-title').textContent = title;
  document.getElementById('d-sub').textContent   = sub;
  document.getElementById('d-xp').textContent    = xp;
  // vocab recap
  var rh='';
  var lid = aq.isReview ? null : aq.lid;
  if (lid && LDATA[lid]) {
    LDATA[lid].vocab.forEach(function(v){
      rh+='<div class="rrow"><span class="res">'+v.em+' '+v.es+'</span>';
      rh+='<span class="ren">'+v.en+'</span>';
      rh+='<span class="rbn bn">'+v.bn+'</span></div>';
    });
    document.getElementById('d-words').textContent = LDATA[lid].vocab.length;
  } else {
    rh='<div class="bn" style="color:var(--muted);text-align:center;padding:16px">Chapter review সম্পন্ন! 🎉</div>';
    document.getElementById('d-words').textContent = aq.questions.length;
  }
  document.getElementById('d-recap').innerHTML = rh;
  document.getElementById('d-score').textContent = pct+'%';
  // next lesson button
  var nextInfo = lid ? getNextLesson(lid) : null;
  var nBox = document.getElementById('d-next-box');
  var nBtn = document.getElementById('d-next-btn');
  var ld   = lid ? LDATA[lid] : null;
  if (nextInfo && ld && ld.next) {
    nBox.style.display='block';
    document.getElementById('d-next-label').textContent='পরবর্তী 👀';
    document.getElementById('d-next-text').textContent=ld.next;
    nBtn.style.display='inline-block';
    nBtn._next = nextInfo;
  } else {
    nBox.style.display='none'; nBtn.style.display='none';
  }
  document.getElementById('tabs').style.display = 'none';
  showPage('pg-done');
}

function gotoNext() {
  var n = document.getElementById('d-next-btn')._next;
  if (!n) { return; }
  document.getElementById('tabs').style.display = 'flex';
  openLesson(n.chId, n.lid);
}

function repeatLesson() {
  if (!curLid) { goHome(); return; }
  var st = getLState(curLid);
  var ld = LDATA[curLid];
  st.fitbChecked=[]; for(var i=0;i<ld.fitb.length;i++){st.fitbChecked.push(false);}
  st.fitbCorrect=0; st.fitbResults=[];
  st.spAttempted=[]; for(var j=0;j<ld.speak.length;j++){st.spAttempted.push(false);}
  st.spCorrect=0; st.spResults=[];
  st.qzIdx=0; st.qzScore=0; st.qzResults=[];
  document.getElementById('tabs').style.display='flex';
  openLesson(curCh, curLid);
}

function getCh(chId) {
  for (var i=0;i<CURRICULUM.length;i++){if(CURRICULUM[i].id===chId){return CURRICULUM[i];}}
  return null;
}
function getLessonInfo(lid) {
  for (var i=0;i<CURRICULUM.length;i++){
    for (var j=0;j<CURRICULUM[i].lessons.length;j++){
      if(CURRICULUM[i].lessons[j].id===lid){return CURRICULUM[i].lessons[j];}
    }
  }
  return null;
}
function getNextLesson(lid) {
  var all=[];
  CURRICULUM.forEach(function(ch){ ch.lessons.forEach(function(l){ all.push({lid:l.id,chId:ch.id}); }); });
  for (var i=0;i<all.length-1;i++){ if(all[i].lid===lid){return all[i+1];} }
  return null;
}
function showPage(id) {
  document.querySelectorAll('.pg').forEach(function(p){p.className='pg';});
  var el=document.getElementById(id);
  if(el){el.className='pg show';}
  window.scrollTo(0,0);
}
function esc(s) { return (s||'').replace(/'/g, "\\'"); }

// ═══════════════════════════════════════════════
function startTimer() {
  timerInt = setInterval(function(){
    timerSecs--;
    if(timerSecs<0){timerSecs=0;clearInterval(timerInt);}
    var m=Math.floor(timerSecs/60), s=timerSecs%60;
    var el=document.getElementById('tc');
    if(el){el.textContent='⏱ '+(m<10?'0':'')+m+':'+(s<10?'0':'')+s;}
  },1000);
}
function addXP(n){ xp+=n; var el=document.getElementById('xc'); if(el){el.textContent='⭐ '+xp+' XP';} showToast('+'+n+' XP! ⭐'); }
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.className='show';
  setTimeout(function(){t.className='';},1700);
}
function playAudio(word){
  var url='https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=es&q='+encodeURIComponent(word);
  var a=new Audio(url);
  a.onerror=function(){ttsFallback(word);};
  a.play().catch(function(){ttsFallback(word);});
}
function ttsFallback(word){
  if(!window.speechSynthesis){return;}
  var u=new SpeechSynthesisUtterance(word);
  u.lang='es-ES'; u.rate=0.85;
  window.speechSynthesis.speak(u);
}
